experiment:
  name: smoke_lstm_output90
  seed: 42
  device: cpu
  output_root: results/runs
  overwrite: true

data:
  train_path: data/processed/uci_power/train_input90_output90.npz
  val_path: data/processed/uci_power/val_input90_output90.npz
  test_path: data/processed/uci_power/test_input90_output90.npz
  max_train_samples: 64
  max_val_samples: 32
  max_test_samples: 32

model:
  name: lstm
  hidden_size: 64
  num_layers: 1
  dropout: 0.0

training:
  epochs: 2
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0
  early_stopping_patience: 2

artifacts:
  plot_examples: 2
